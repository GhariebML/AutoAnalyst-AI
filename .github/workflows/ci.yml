name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Basic import check
        run: |
          python -c "import autoanalyst; print(autoanalyst.__version__)"
          python -c "from autoanalyst.data_profiling.profiler import generate_basic_profile"

      - name: Compile Python files
        run: python -m compileall -q app src tests

      - name: Run tests
        run: pytest
