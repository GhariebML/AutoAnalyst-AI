# This file defines the default issue template and available templates.
blank_issues_enabled: false
contact_links:
  - name: Agent Task
    url: https://github.com/GhariebML/ADPilot/issues/new?assignees=&labels=agent%2C+enhancement&template=agent_task.md&title=%5BAgent%5D+%3CAgentName%3E+-+%3CShort+description%3E
    about: Create a new agent implementation task.
  - name: Bug Report
    url: https://github.com/GhariebML/ADPilot/issues/new?assignees=&labels=bug&template=bug_report.md&title=%5BBUG%5D+%3Cshort+description%3E
    about: Report a bug.
  - name: Schema Change Request
    url: https://github.com/GhariebML/ADPilot/issues/new?assignees=&labels=schema%2C+enhancement&template=schema_change_request.md&title=%5BSCHEMA%5D+%3CSchemaName%3E+-+%3CShort+description%3E
    about: Propose changes to shared schemas.
  - name: Documentation Task
    url: https://github.com/GhariebML/ADPilot/issues/new?assignees=&labels=documentation&template=documentation_task.md&title=%5BDOC%5D+%3CDocument+Name%3E+-+%3CShort+description%3E
    about: Request documentation updates.
