version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LLM_PROVIDER=openrouter
      - DATABASE_URL=sqlite+aiosqlite:///./data/adpilot.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - adpilot_data:/app/data
    restart: always
    depends_on:
      - redis

  worker:
    build: .
    command: arq src.adpilot.worker.WorkerSettings
    environment:
      - ENVIRONMENT=production
      - LLM_PROVIDER=openrouter
      - DATABASE_URL=sqlite+aiosqlite:///./data/adpilot.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - adpilot_data:/app/data
    restart: always
    depends_on:
      - redis
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  adpilot_data:
  redis_data: